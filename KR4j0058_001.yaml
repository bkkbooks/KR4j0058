body:
  text: 斷腸詞宋朱淑真撰憶秦娥正月初六夜月彎彎曲新年新月鈎寒玉鈎寒玉鳳鞵兒小翠睂兒蹙閙蛾雪栁添粧束燭龍火樹争馳逐元宵三五不如初六浣溪沙清明春巷夭桃吐絳英春衣初試薄羅輕風和烟煗燕巢成小院湘簾閒不捲曲房朱戸悶長扄惱人光㬌又清明又春夜玉體金釵一様嬌背燈初解繡裙腰衾寒枕冷夜香銷深院重關春寂寂落花和雨夜迢迢恨情和夣更無聊生查子寒食不多時幾日東風惡無緒倦尋芳閒却鞦韆索玉減翠裙交病怯羅衣薄不忍捲簾㸔寂莫梨花落又世傳大曲十首朱淑真生查子居第八調入大石此曲是也集中不載今取入此年年玉鏡臺梅蕋宫粧困今嵗未還家怕見江南信酒從别後疎淚向愁中盡遥想楚雲深人逺天涯近謁金門春已半觸目此情無限十二䦨干閒倚遍愁來天不管好是風和日暖輸與鸎鸎燕燕滿院落花簾不捲斷腸芳草逺江城子賞春斜風細雨作春寒對尊前憶前歡曽把梨花寂莫淚䦨干芳草斷煙南浦路和别淚看青山昨宵結得夢夤縁水雲間悄無言爭奈醒來愁恨又依然展轉衾裯空懊惱天易見見伊難減字木蘭花春怨獨行獨坐獨倡獨酬還獨卧佇立傷神無奈春寒著摸人此情誰見淚洗殘粧無一半愁病相仍剔盡寒燈夢不成眼兒媚遲遲風日弄輕柔花徑暗香流清明過了不堪回首雲鎖朱樓午窗睡起鸎聲巧何處喚春愁緑楊影裏海棠枝畔紅杏梢頭鷓鴣天獨倚䦨干晝日長紛紛蜂蝶鬬輕狂一天飛絮東風惡滿路桃花春水香當此際意偏長萋萋芳草傍池塘千鍾尚欲偕春醉幸有荼䕷與海棠清平樂風光𦂳急三月俄三十擬欲留連計無及緑野煙愁露泣倩誰寄語春宵城頭畫鼔輕敲繾綣臨岐囑付來年早到梅梢又夏日遊湖惱煙撩露留我須㬰住㩦手藕花湖上路一霎黃梅細雨嬌癡不怕人猜隨羣暫遣愁懷最是分㩦時候歸來嬾傍粧臺㸃絳唇向誤刻木蘭花黄鳥嚶嚶曉來却聽丁丁木芳心已逐淚眼傾珠斛見自無心更調離情曲鴛幃猶望休窮目回首溪山緑又冬風勁雲濃暮寒無奈侵羅幙髻鬟斜掠呵手梅粧薄少飲清歡銀燭花頻落恁蕭索春工已覺㸃破梅香蕚蝶戀花送春樓外垂楊千萬縷欲繫青春少住春還去猶自風前飄柳絮隨春且看歸何處緑滿山川聞杜宇便做無情莫也愁人苦把酒送春春不語黄昏却下瀟瀟雨菩薩鬘秋秋聲乍起梧桐落蛩吟唧唧添蕭索欹枕背燈眠月和殘夢圓起來鈎翠箔何處寒砧作獨倚小䦨干偪人風露寒又山亭水榭秋方半鳳幃寂寞無人伴愁悶一番新雙蛾只舊顰起來臨繡户時有疎螢度多謝月相憐今宵不忍圓又木樨也無梅柳新標格也無桃李妖嬈色一味惱人香羣花爭敢當情知天上種飄落深岩洞不管月宫寒將枝比竝看又咏梅溼雲不渡溪橋冷蛾寒初破霜鈎影溪下水聲長一枝和月香人憐花似舊花不知人瘦獨自倚䦨干夜深花正寒鵲橋仙七夕巧雲粧晩西風罷暑小雨翻空月墜牽牛織女㡬經秋尚多少離腸恨淚微涼入袂幽歡生座天上人間滿意何如暮暮與朝朝更改却年年歲歲念奴嬌催雪冬晴無雪是天心未肯化工非拙不放玉花飛墮地留在廣寒宫闕雲欲同時霰將集處紅日三竿揭六花剪就不知何處施設應念隴首寒梅花開無伴對景眞愁絶待出和羮金鼎手為把玉鹽飄撒溝壑皆平乾坤如畫更吐氷輪潔梁園燕客夜明不怕燈滅又鵝毛細剪是瓊珠密灑一時堆積斜倚東風渾漫漫頃刻也須盈尺玉作樓臺鉛鎔天地不見遥岑碧佳人作戲碎揉些子抛擲爭奈好景難留風僝雨僽打碎光凝色總有十分輕妙態誰似舊時憐惜擔閣梁吟寂莫楚舞笑揑獅兒隻梅花依舊歲寒松竹三益卜算子詠梅竹裏一枝梅映帯林逾静雨後清竒畫不成淺水横疎影吹徹小單于心事思重省拂拂風前度暗香月色侵花冷柳梢青咏梅玉骨氷肌為誰偏好特地相宜一味風流廣平休賦和靖無詩倚窗睡起春遲困無力菱花笑窺嚼蕋吹香睂心㸃處鬢畔簮時又凍合疎籬半飄殘雪斜臥枝低可便相宜煙藏修竹月在寒溪亭亭竚立移時拚瘦損無妨為伊誰賦才情画成幽思寫入新詞又雪舞霜飛隔簾疎影微見横枝不道寒香解隨羌管吹到屏幃箇中風味誰知睡乍起烏雲甚欹嚼蕋粧英淺顰輕笑酒半醒時斷腸詞終
